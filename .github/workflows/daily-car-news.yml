name: 每日汽车热点

on:
  schedule:
    - cron: '0 2 * * *'  # 北京时间10:00
  workflow_dispatch:

jobs:
  daily-car-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装字体和依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-wqy-zenhei fonts-noto-cjk 2>/dev/null || true
          pip install requests beautifulsoup4 pillow

      - name: 生成内容 & 发送邮件
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QMAIL_AUTH_CODE: ${{ secrets.QMAIL_AUTH_CODE }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python3 scripts/generate_and_send.py

      - name: 归档图片
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: car-news-images
          path: output/
          retention-days: 7
